trigger: none

parameters:
  - name: Environment
    type: string
    default: 'dev'
    values:
      - dev
      - prod

pool:
  vmImage: 'ubuntu-latest'

variables:
  - ${{ if eq(parameters.Environment, 'dev') }}:
    - group: Terraform-dev
  - ${{ if eq(parameters.Environment, 'prod') }}:
    - group: Terraform-prod

# ----- STAGE 1: Terraform Installer -----
stages:
  - stage: TerraformInstaller
    displayName: 'Terraform Installer'
    jobs:
      - job: TFInstaller_job1
        displayName: 'Terraform Installer'
        steps:                                             # ← steps: was missing
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
            displayName: 'Install Terraform latest'
          
          # - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
          #   displayName: 'Terraform: fmt'
          #   inputs:
          #     provider: azurerm
          #     command: fmt
          #     commandOptions: '--check --recursive'
          #     workingDirectory: $(workingDirectory)

  - stage: TerraformInit
    displayName: 'Terraform Init'
    dependsOn: TerraformInstaller                         # ← added to enforce ordering
    jobs:
      - job: TFInit_job1                                  # ← job block was missing
        displayName: 'Terraform Init'
        steps:
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
            displayName: 'Install Terraform latest'
                                                         
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: 'Terraform: Init'               # ← moved inside steps
            inputs:                                       # ← was missing entirely
              provider: azurerm
              command: init
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)

          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: 'Terraform: Validate'
            inputs:
              provider: azurerm
              command: validate
              workingDirectory: $(workingDirectory)
          

            


  # ----- STAGE 3: Terraform Plan -----
  - stage: TerraformPlan
    displayName: 'Terraform Plan - ${{ parameters.Environment }}'
    dependsOn: TerraformInit                      # ← added to enforce ordering
    variables:
      - ${{ if eq(parameters.Environment, 'dev') }}:
        - group: Terraform-dev
      - ${{ if eq(parameters.Environment, 'prod') }}:
        - group: Terraform-prod
    jobs:
      - job: TFPlan_job1                                  # ← job block was missing
        displayName: 'Terraform Plan'
        #dependsOn: TerraformInit                         # ← added to enforce ordering
        steps:
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
            displayName: 'Install Terraform latest'                                            # ← steps block was missing
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: 'Terraform: Init'
            inputs:                                       # ← was missing entirely
              provider: azurerm
              command: init
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)              # ← moved inside steps
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-release-task.TerraformTaskV4@4
            displayName: 'Terraform: Plan'
            inputs:                                       # ← was incorrectly "parameters:"
              provider: azurerm
              command: plan
              workingDirectory: $(workingDirectory)
              # backendServiceArm: $(azureServiceConnection)
              environmentServiceNameAzureRM: $(azureServiceConnection)  # ← added missing input
