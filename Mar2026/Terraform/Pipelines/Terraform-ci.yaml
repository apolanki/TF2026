trigger: none

parameters:
  - name: Environment
    type: string
    default: 'dev'
    values:
      - dev
      - prod
variables: 
  - ${{ if eq(parameters.Environment, 'dev') }}:
    - group: Terraform-dev
  - ${{ if eq(parameters.Environment, 'prod') }}:
    - group: Terraform-prod
stages:
  - stage: TerraformFormat
    displayName: 'Terraform Format'
    jobs:
      - job: TerraformFormat
        displayName: 'Terraform Format'
        steps:
          - task: TerraformInstaller@0
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'
          - script: | 
              terraform fmt -check -recursive
              workingDirectory:$(System.DefaultWorkingDirectory)/Terraform
            displayName: 'Check Terraform Format'
  # ----- STAGE 2: Terraform Validate -----          
  - stage: TerraformValidate
    displayName: 'Terraform Validate'
    dependsOn: TerraformFormat
    jobs:
      - job: TerraformValidate
        displayName: 'Terraform Validate'
        steps:
          - task: TerraformInstaller@0
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(System.DefaultWorkingDirectory)/Terraform
              #backendServiceArm: ${{ variables.azureServiceConnection }}
              backendAzureRmResourceGroupName: ${{ variables.backendResourceGroup }}
              backendAzureRmStorageAccountName: ${{ variables.backendStorageAccount }}
              backendAzureRmContainerName: ${{ variables.backendContainer }}
              backendAzureRmKey: ${{ variables.backendKey }}
          
          - task: TerraformTaskV4@4
            displayName: 'Terraform Validate'
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: $(System.DefaultWorkingDirectory)/Terraform

# ----- STAGE 3: Terraform Plan -----

  - stage: TerraformPlan
    displayName: 'Terraform Plan'
    dependsOn: TerraformValidate
    jobs:
      - job: TerraformPlan
        displayName: 'Terraform Plan'
        steps:
          - task: TerraformInstaller@0
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(System.DefaultWorkingDirectory)/Terraform
              #backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: $(System.DefaultWorkingDirectory)/Terraform
              #backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)
        